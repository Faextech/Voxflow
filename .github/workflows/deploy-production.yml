name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "static/**"
      - "migrations/**"
      - "requirements.txt"
      - "config.py"
      - "run.py"
      - "deploy/hostinger/**"
      - "scripts/vps_deploy.sh"
  workflow_dispatch:

jobs:
  # SSH direto (quando porta 22 estiver acessível externamente)
  deploy-ssh:
    runs-on: ubuntu-latest
    if: ${{ secrets.VPS_SSH_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync and rebuild via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd /opt/voxflow
            git fetch origin main 2>/dev/null || true
            bash scripts/vps_deploy.sh

  # Fallback: dispara poll imediato na VPS (funciona sem SSH inbound)
  trigger-poll:
    runs-on: ubuntu-latest
    needs: deploy-ssh
    if: always() && (needs.deploy-ssh.result == 'skipped' || needs.deploy-ssh.result == 'failure')
    steps:
      - name: Notify poll deploy (optional webhook)
        if: ${{ secrets.VPS_DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.VPS_DEPLOY_WEBHOOK_TOKEN }}" \
            "${{ secrets.VPS_DEPLOY_WEBHOOK_URL }}"

      - name: Poll deploy instructions
        run: |
          echo "SSH indisponível ou secrets não configurados."
          echo "Use auto-deploy na VPS: bash scripts/install_vps_autodeploy.sh"
          echo "Ou rode manualmente no terminal web: bash /opt/voxflow/scripts/vps_deploy.sh"
