name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke tests
        run: pytest tests/test_api_v1_smoke.py -q --tb=short
        continue-on-error: true

      - name: Validate deploy scripts
        run: |
          bash -n scripts/vps_deploy.sh
          bash -n scripts/vps_poll_deploy.sh
          bash -n scripts/install_vps_autodeploy.sh
