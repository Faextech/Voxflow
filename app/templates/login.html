<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NexDial</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #111827;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #7c3aed;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #6d28d9;
        }

        .link {
            text-align: center;
            margin-top: 12px;
        }

        .link a {
            color: #7c3aed;
            text-decoration: none;
        }

        .error {
            color: red;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Login NexDial</h2>

        <div id="error" class="error"></div>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Senha">

        <button onclick="login()">Entrar</button>

        <div class="link">
            <a href="/register-page">Criar conta</a>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            errorDiv.innerText = '';

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorDiv.innerText = data.error || 'Erro no login';
                    return;
                }

                // salva no localStorage
                localStorage.setItem('nexdial_token', data.token);
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('company_id', data.company_id);
                localStorage.setItem('nexdial_role', data.role || 'agent');
                localStorage.setItem('nexdial_user_name', data.name || '');
                if (data.agent_id) localStorage.setItem('agent_id', data.agent_id);

                window.location.href = '/';

            } catch (err) {
                errorDiv.innerText = 'Erro ao conectar com o servidor';
            }
        }
    </script>
</body>
</html>
